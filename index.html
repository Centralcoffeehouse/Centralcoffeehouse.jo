<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Central Coffeehouse</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #2f1b14, #6b3f2a);
        color: #fff8f2;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
        border-radius: 18px;
        padding: 2rem 2.5rem;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        text-align: center;
        max-width: 640px;
      }
      h1 {
        margin-top: 0;
        font-size: 2.2rem;
      }
      p {
        line-height: 1.6;
        font-size: 1rem;
      }
      a {
        color: #ffd8b0;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Central Coffeehouse</h1>
      <p>Welcome to our cozy corner for coffee, conversation, and community.</p>
      <p>This page is now published and ready to share.</p>
    </main>
  </body>
</html>
